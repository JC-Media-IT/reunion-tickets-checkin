<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner & Table - JC Reunion</title>
  <link rel="icon" href="https://quota.jc.tu.ac.th/images/jc_logo.png" type="image/png">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    body { background-color: #f4f6f9; font-family: sans-serif; padding-top: 70px; }
    .bg-theme { background: #702A8C; }
    .content-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-theme shadow fixed-top">
    <div class="container-fluid"> 
      <a class="navbar-brand" href="#">ระบบ Check-in</a>
      <div class="d-flex align-items-center text-white">
        <span class="me-3" id="adminNameDisplay">กำลังโหลด...</span>
        <button class="btn btn-sm btn-danger" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <div class="container mt-3">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="content-card text-center">
          <h5><i class="fas fa-qrcode"></i> สแกน QR Code</h5>
          <div id="reader" style="width: 100%; border-radius: 8px; overflow: hidden; border: 2px solid #702A8C;"></div>
        </div>
      </div>
    </div>

    <div class="row mt-2">
      <div class="col-12">
        <div class="content-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0"><i class="fas fa-list"></i> ประวัติการ Check-in ล่าสุด</h5>
            <button class="btn btn-sm btn-outline-primary" onclick="loadTableData()"><i class="fas fa-sync-alt"></i> รีเฟรช</button>
          </div>
          <div class="table-responsive">
            <table id="checkinTable" class="table table-striped table-bordered" style="width:100%">
              <thead>
                <tr>
                  <th>เวลาเข้างาน</th>
                  <th>รหัสตั๋ว</th>
                  <th>ชื่อบนตั๋ว</th>
                  <th>JC รุ่น</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 🔴🔴 ลบคำว่า YOUR_GAS_WEB_APP_URL แล้วใส่ลิงก์ Google Apps Script จริงๆ ของคุณ 🔴🔴
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwV5PNeVtagevlau4VjXw5_zhjVGN8Wu6bwlfSHIAFShMmbYtTzihn5BFZP3u81Q_gy/exec"; 

    let currentAdmin = sessionStorage.getItem('personInCharge');
    let currentUser = sessionStorage.getItem('loggedInUser');
    let dataTableInstance = null;

    if (!currentAdmin || !currentUser) {
      window.location.href = 'index.html';
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('adminNameDisplay').innerText = currentAdmin;
        startScanner();
        loadTableData();
    });

    function callGasAPI(action, payload = {}) {
        payload.action = action; 
        return fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        }).then(res => res.json());
    }

    let isProcessing = false;
    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => { 
              if (!isProcessing) {
                isProcessing = true;
                Swal.fire({ title: 'ตรวจสอบตั๋ว...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                callGasAPI('verifyTicket', { ticketId: decodedText }).then(res => {
                  if(res.success && res.found) {
                    // ป้องกันการแสกนซ้ำ
                    if(res.status === 'Checked-in') {
                        Swal.fire('แจ้งเตือน', 'ตั๋วของคุณ ' + res.name + ' ได้ถูกเช็คอินไปแล้ว!', 'warning').then(() => isProcessing = false);
                    } else {
                        Swal.fire({
                          title: 'ตรวจสอบสำเร็จ', html: `<b>ชื่อบนตั๋ว:</b> ${res.name}`, icon: 'success', showCancelButton: true, confirmButtonText: 'ยืนยัน Check-in'
                        }).then(result => {
                          if(result.isConfirmed) processCheckin(decodedText);
                          else isProcessing = false;
                        });
                    }
                  } else {
                    Swal.fire('ไม่พบตั๋ว', 'รหัสตั๋วไม่ถูกต้อง', 'error').then(() => isProcessing = false);
                  }
                }).catch(err => {
                    Swal.fire('Error', 'เชื่อมต่อฐานข้อมูลล้มเหลว', 'error').then(() => isProcessing = false);
                });
              }
            },
            (err) => { }
        );
    }

    function processCheckin(ticketId) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      callGasAPI('confirmCheckin', { ticketId: ticketId, username: currentUser, adminName: currentAdmin })
      .then(res => {
        if(res.success) {
          Swal.fire('สำเร็จ', 'บันทึกเวลาเข้างานเรียบร้อยแล้ว', 'success').then(() => {
            isProcessing = false;
            loadTableData(); // โหลดตารางใหม่หลังกด Check-in
          });
        }
      });
    }

    function loadTableData() {
      callGasAPI('getRecentCheckins').then(res => {
        if(res.success) {
          let tbody = '';
          res.data.forEach(row => {
            // [เวลาเข้างาน, รหัสตั๋ว, ชื่อบนตั๋ว, JC รุ่น]
            tbody += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td></tr>`;
          });
          
          if(dataTableInstance) { $('#checkinTable').DataTable().destroy(); }
          
          document.getElementById('tableBody').innerHTML = tbody;
          dataTableInstance = $('#checkinTable').DataTable({ 
            order: false, // เรียงมาให้จาก GAS แล้ว
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json' }
          });
        }
      });
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
