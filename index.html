<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - JC Reunion</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      font-family: "Noto Sans Thai", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f2f5;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border: none;
    }

    .login-card .card-header {
      background-color: #743d88;
      color: white;
      text-align: center;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      padding: 20px;
    }
    
    .login-card .card-header img {
        width: 50px;
        margin-bottom: 10px;
    }

    .btn-login {
      background-color: #743d88;
      border-color: #6f42c1;
      color: white;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    .btn-login:hover {
      background-color: #5a349d;
      border-color: #533090;
    }

    .input-group-text {
        width: 42px;
        justify-content: center;
    }

     /* 🎯 เพิ่มโค้ดส่วนนี้เข้าไป */
    @media (max-width: 576px) {
      body {
        align-items: flex-start; /* จัดให้ชิดด้านบน */
        padding-top: 2vh;      /* เพิ่มระยะห่างจากขอบบน 5% ของความสูงจอ */
      }
    }
  </style>
</head>

<body>
  <div class="card login-card">
    <div class="card-header">
      <img src="https://quota.jc.tu.ac.th/images/jc_logo.png" alt="JC Logo">
      <h4>ระบบ Admin JC Reunion 2026</h4>
      <p class="mb-0">คณะวารสารศาสตร์และสื่อสารมวลชน</p>
    </div>
    <div class="card-body p-4">
      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">ชื่อผู้ใช้ (Username)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้" required>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">รหัสผ่าน (Password)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน" required>
          </div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe">
            จำชื่อผู้ใช้ไว้
          </label>
        </div>

        <div class="text-danger text-center" style="font-size: 0.9rem;">
          (ท่านสามารถปิดแถบสีฟ้าด้านบนเพื่อขยายหน้าจอให้ใหญ่ขึ้น)
        </div>


        <div class="d-grid">
          <button type="submit" class="btn btn-login btn-lg">
            <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
          </button>
        </div>
      </form>
      <div class="text-center ">
        <small class="text-muted">Copyright © 2026 Faculty of Journalism and Mass
          Communication, Thammasat University. <br> All rights reserved.
        Powered by
          <a href="https://jc.tu.ac.th/th/personnel/staff#committee_214" class="icon-link" target="_top">
            งานเทคโนโลยีดิจิทัลและการสื่อสาร คณะวารสารศาสตร์และสื่อสารมวลชน
          </a>
        </small>
      </div>
    </div>
  </div>

  <script>
    // 🔴🔴 ใส่ URL ของ GAS WEB APP ตรงนี้ 🔴🔴
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxuXKaJ55-V5a1PPEZogIGyHdu6ZL47m8RW7QQaeqXbmWZLOcNHKojZz2E-iXSLsYgA/exec"; 
    window.addEventListener('load', function() {
      const savedUser = localStorage.getItem('rememberedUser');
      const savedPass = localStorage.getItem('rememberedPass'); 

      if (savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('rememberMe').checked = true;
        if (savedPass) {
          document.getElementById('password').value = savedPass;
        }
      }
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ป้องกัน CORS
        body: JSON.stringify({ action: "login", username: user, password: pass })
      })
      .then(response => response.json())
      .then(data => {
        if(data.success) {
          // เก็บข้อมูลลงเบราว์เซอร์
          sessionStorage.setItem('loggedInUser', data.username);
          sessionStorage.setItem('personInCharge', data.adminName);
          
          Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'ยินดีต้อนรับคุณ ' + data.adminName, timer: 1500, showConfirmButton: false })
          .then(() => {
            // พาไปหน้าสแกน
            window.location.href = 'checkin.html';
          });
        } else {
          Swal.fire('ข้อผิดพลาด', data.error, 'error');
        }
      })
      .catch(err => Swal.fire('Error', err.toString(), 'error'));
    });
  </script>
</body>
</html>
