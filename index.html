<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบ Check-in (GitHub) - JC Reunion</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root { --jc-purple: #702A8C; --jc-purple-light: #9B4F96; }
    body { font-family: "Noto Sans Thai", sans-serif; background-color: #f4f6f9; display: flex; flex-direction: column; min-height: 100vh; padding-top: 80px; }
    .bg-theme { background: linear-gradient(135deg, var(--jc-purple) 0%, var(--jc-purple-light) 100%); }
    .brand-container { display: flex; align-items: center; text-decoration: none; color: white; }
    .brand-logo { height: 45px; margin-right: 15px; background-color: white; border-radius: 50%; padding: 3px; }
    .brand-text h4 { margin: 0; font-size: 1.2rem; font-weight: 700; }
    .brand-text small { font-size: 0.75rem; opacity: 0.9; }
    .table-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background-color: white; padding: 20px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-theme shadow fixed-top">
    <div class="container-fluid px-3 px-lg-4"> 
      <a class="brand-container me-auto" href="#">
        <img src="https://quota.jc.tu.ac.th/images/jc_logo.png" alt="JC Logo" class="brand-logo">
        <div class="brand-text">
          <h4>ระบบ Check-in</h4>
          <small id="adminNameDisplay">กำลังโหลดผู้ใช้งาน...</small>
        </div>
      </a>
    </div>
  </nav>

  <div class="container-fluid py-4 flex-grow-1">
    <div class="row px-3 justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="table-card py-4 px-3 px-md-5 text-center">
          <h4 class="text-dark mb-4"><i class="fas fa-qrcode text-primary"></i> สแกน QR Code เพื่อเช็คอิน</h4>
          <div id="reader" style="width: 100%; max-width: 500px; margin: 0 auto; border-radius: 8px; overflow: hidden; border: 2px solid var(--jc-purple);"></div>
          
          <button class="btn btn-secondary mt-4 w-100" onclick="window.close()" style="border-radius: 10px; padding: 10px;">
            <i class="fas fa-times-circle"></i> ปิดหน้าต่างนี้ (กลับไปหน้าหลัก)
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 🔴🔴 วาง Web App URL จาก GAS (ที่ได้จากขั้นตอนที่ 1) ลงตรงนี้ 🔴🔴
    const GAS_API_URL = "YOUR_GAS_WEB_APP_URL"; 

    // ดึงค่า URL Parameters ที่ส่งมาจากหน้า Manage
    const urlParams = new URLSearchParams(window.location.search);
    const currentAdmin = urlParams.get('admin') || "Unknown Admin";
    const currentUser = urlParams.get('user') || "admin";

    let html5QrCode;
    let isProcessing = false;

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('adminNameDisplay').innerText = "พนักงาน: " + currentAdmin;
        startScanner();
    });

    // ฟังก์ชันเชื่อมต่อกับ GAS 
    function callGasAPI(action, payload) {
        payload.action = action; 
        return fetch(GAS_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        }).then(response => response.json());
    }

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => { onScanSuccess(decodedText); },
            (errorMessage) => { }
        ).catch(err => Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเข้าถึงกล้องได้ โปรดอนุญาตสิทธิ์การใช้กล้อง', 'error'));
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return; 
        isProcessing = true;
        
        Swal.fire({ title: 'กำลังตรวจสอบข้อมูลตั๋ว...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        callGasAPI('verifyTicket', { ticketId: decodedText })
            .then(response => handleTicketVerification(response))
            .catch(error => {
                Swal.fire('ข้อผิดพลาดการเชื่อมต่อ', error.message, 'error').then(() => isProcessing = false);
            });
    }

    function handleTicketVerification(response) {
      if (!response.success || !response.found) {
        Swal.fire({ icon: 'error', title: 'ตั๋วไม่ถูกต้อง', text: 'ไม่พบรหัสตั๋วนี้ในระบบ' }).then(() => isProcessing = false);
        return;
      }
      if (response.status === 'Checked-in') {
        Swal.fire({ icon: 'warning', title: 'ตั๋วถูกใช้งานแล้ว', text: 'ตั๋วชื่อ: ' + response.name + ' ถูกใช้ Check-in ไปแล้ว' }).then(() => isProcessing = false);
        return;
      }

      Swal.fire({
        title: 'ตรวจสอบสำเร็จ!',
        html: `<div class="text-start bg-light p-3 rounded"><b>ชื่อ:</b> ${response.name}<br><b>Ticket:</b> ${response.ticketId}</div>`,
        icon: 'success', showCancelButton: true, confirmButtonText: 'ยืนยัน Check-in', cancelButtonText: 'ยกเลิก'
      }).then((result) => {
        if (result.isConfirmed) { processCheckin(response.ticketId); } 
        else { isProcessing = false; }
      });
    }

    function processCheckin(ticketId) {
      Swal.fire({ title: 'กำลังบันทึกเข้าระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      callGasAPI('confirmCheckin', { ticketId: ticketId, username: currentUser, adminName: currentAdmin })
        .then(response => {
          if (response.success) {
            Swal.fire({ icon: 'success', title: 'Check-in สำเร็จ!', timer: 2000 }).then(() => isProcessing = false);
          } else {
            Swal.fire('ข้อผิดพลาด', response.error, 'error').then(() => isProcessing = false);
          }
        })
        .catch(err => Swal.fire('เกิดข้อผิดพลาด', err.message, 'error').then(() => isProcessing = false));
    }
  </script>
</body>
</html>
