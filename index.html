<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - JC Reunion</title>
  <link rel="icon" href="https://quota.jc.tu.ac.th/images/jc_logo.png" type="image/png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: "Noto Sans Thai", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f2f5;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border: none;
    }
    .login-card .card-header {
      background-color: #743d88;
      color: white;
      text-align: center;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      padding: 20px;
    }
    .login-card .card-header img {
        width: 50px;
        margin-bottom: 10px;
    }
    .btn-login {
      background-color: #743d88;
      border-color: #6f42c1;
      color: white;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .btn-login:hover {
      background-color: #5a349d;
      border-color: #533090;
      color: white;
    }
    .input-group-text {
        width: 42px;
        justify-content: center;
    }
    @media (max-width: 576px) {
      body {
        align-items: flex-start;
        padding-top: 5vh;
      }
    }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-header">
      <img src="https://quota.jc.tu.ac.th/images/jc_logo.png" alt="JC Logo">
      <h4>ระบบ Check-in JC Reunion 2026</h4>
      <p class="mb-0">คณะวารสารศาสตร์และสื่อสารมวลชน</p>
    </div>
    <div class="card-body p-4">
      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">ชื่อผู้ใช้ (Username)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้ (ไม่ต้องใส่ @tu หรือ @dome)" required>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">รหัสผ่าน (Password)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่านเดียวกับของมหาลัยฯ" required>
          </div>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe">
            จำชื่อผู้ใช้และรหัสผ่านไว้
          </label>
        </div>
        <div class="d-grid mb-4">
          <button type="submit" class="btn btn-login btn-lg">
            <i class="fas fa-sign-in-alt me-2"></i> เข้าสู่ระบบ
          </button>
        </div>
      </form>
      <div class="text-center">
        <small class="text-muted">Copyright © 2026 Faculty of Journalism and Mass
          Communication, Thammasat University. <br> All rights reserved. <br>
        Powered by
          <a href="https://jc.tu.ac.th/th/personnel/staff#committee_214" class="text-decoration-none" style="color: #743d88;" target="_top">
            งานเทคโนโลยีดิจิทัลและการสื่อสาร
          </a>
        </small>
      </div>
    </div>
  </div>

  <script>
    // 🔴🔴 URL ของ GAS WEB APP 🔴🔴
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxNdeA5cJy6rMEzgCLzez85ZJX_RSRd0F0zTZvjsNwtJVz7jdWdJB_bhdqjPJX4RLME/exec"; 
    
    document.addEventListener('DOMContentLoaded', () => {
      // โหลดการจดจำรหัส
      const remUser = localStorage.getItem('rememberedUser');
      const remPass = localStorage.getItem('rememberedPass');
      if (remUser && remPass) {
        document.getElementById('username').value = remUser;
        document.getElementById('password').value = remPass;
        document.getElementById('rememberMe').checked = true;
      }
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const rememberIsChecked = document.getElementById('rememberMe').checked;

      Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ป้องกัน CORS
        body: JSON.stringify({ action: "login", username: user, password: pass })
      })
      .then(response => response.json())
      .then(data => {
        if(data.success) {
          
          // 🟢 บันทึก/ลบ การจดจำรหัสผ่าน
          if (rememberIsChecked) {
            localStorage.setItem('rememberedUser', user);
            localStorage.setItem('rememberedPass', pass);
          } else {
            localStorage.removeItem('rememberedUser');
            localStorage.removeItem('rememberedPass');
          }

          // เก็บ Session เพื่อให้รู้ว่า Login แล้ว
          sessionStorage.setItem('loggedInUser', data.username);
          sessionStorage.setItem('personInCharge', data.adminName);
          
          Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'ยินดีต้อนรับคุณ ' + data.adminName, timer: 1500, showConfirmButton: false })
          .then(() => {
            // พาไปหน้าสแกน checkin.html
            window.location.href = 'checkin.html';
          });
        } else {
          // แจ้ง Error แบบตรงไปตรงมา (ตรงกับที่ GAS ส่งมาให้)
          Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบล้มเหลว', text: data.error });
        }
      })
      .catch(err => {
        Swal.fire({ icon: 'error', title: 'ข้อผิดพลาดเครือข่าย', text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้' });
      });
    });
  </script>
</body>
</html>
