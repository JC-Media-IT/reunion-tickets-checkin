<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - JC Reunion</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    .btn-purple { background-color: #702A8C; color: white; }
    .btn-purple:hover { background-color: #4A1C5D; color: white; }
  </style>
</head>
<body>

  <div class="login-card">
    <img src="https://quota.jc.tu.ac.th/images/jc_logo.png" alt="JC Logo" height="80" class="mb-3">
    <h4 class="mb-4 text-dark">ระบบ Check-in</h4>
    
    <form id="loginForm">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="username" placeholder="Username" required>
        <label for="username">Username</label>
      </div>
      <div class="form-floating mb-4">
        <input type="password" class="form-control" id="password" placeholder="Password" required>
        <label for="password">Password</label>
      </div>
      <button type="submit" class="btn btn-purple w-100 py-2 fs-5">เข้าสู่ระบบ</button>
    </form>
  </div>

  <script>
    // 🔴🔴 ใส่ URL ของ GAS WEB APP ตรงนี้ 🔴🔴
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzY1xSgg_r2m1cbifZZm9SyURIYmt3afGR7n9qgL40kg18cWaJos1_gxiMoEKxdi9iW/exec"; 

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // ป้องกัน CORS
        body: JSON.stringify({ action: "login", username: user, password: pass })
      })
      .then(response => response.json())
      .then(data => {
        if(data.success) {
          // เก็บข้อมูลลงเบราว์เซอร์
          sessionStorage.setItem('loggedInUser', data.username);
          sessionStorage.setItem('personInCharge', data.adminName);
          
          Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'ยินดีต้อนรับคุณ ' + data.adminName, timer: 1500, showConfirmButton: false })
          .then(() => {
            // พาไปหน้าสแกน
            window.location.href = 'checkin.html';
          });
        } else {
          Swal.fire('ข้อผิดพลาด', data.error, 'error');
        }
      })
      .catch(err => Swal.fire('Error', err.toString(), 'error'));
    });
  </script>
</body>
</html>
